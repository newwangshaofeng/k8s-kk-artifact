name: build-kubekey-artifact-arm64

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: Kubernetes version
        required: true
        default: v1.30.10
      release_tag:
        description: Optional GitHub Release tag
        required: false
        default: ""
      release_name:
        description: Optional GitHub Release name
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    name: build-and-release-arm64
    runs-on: ubuntu-24.04-arm
    env:
      KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}
      ARCH: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download KubeKey
        shell: bash
        run: |
          set -euo pipefail
          curl -sfL https://get-kk.kubesphere.io | sh -
          chmod +x kk

      - name: Generate manifest
        shell: bash
        run: |
          set -euo pipefail
          ./kk create manifest --with-kubernetes "${KUBERNETES_VERSION}" -y
          manifest_source=""
          for candidate in manifest.yaml manifest-sample.yaml sample.yaml config-sample.yaml; do
            if [[ -f "${candidate}" ]]; then
              manifest_source="${candidate}"
              break
            fi
          done
          if [[ -z "${manifest_source}" ]]; then
            manifest_source="$(find . -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) | sed 's|^\./||' | grep -v '^manifest-\(amd64\|arm64\)\.yaml$' | head -n 1)"
          fi
          if [[ -z "${manifest_source}" ]]; then
            echo "No manifest file generated by kk create manifest"
            ls -la
            exit 1
          fi
          python3 -m pip install --disable-pip-version-check pyyaml
          python3 scripts/prepare_kubekey_manifest.py \
            --input "${manifest_source}" \
            --output "manifest-${ARCH}.yaml" \
            --arch "${ARCH}"

      - name: Validate manifest compatibility
        shell: bash
        run: |
          set -euo pipefail
          if grep -q "hybridnetdev/hybridnet" "manifest-${ARCH}.yaml"; then
            echo "arm64 manifest still contains hybridnet image"
            cat "manifest-${ARCH}.yaml"
            exit 1
          fi

      - name: Export artifact package
        id: export
        shell: bash
        run: |
          set -euo pipefail
          output_file="kubekey-artifact-k8s-${KUBERNETES_VERSION}-kk-latest-linux-${ARCH}.tar.gz"
          sudo ./kk artifact export -m "manifest-${ARCH}.yaml" -o "${output_file}"
          sudo chown "$(id -u):$(id -g)" "${output_file}"
          sha256sum "${output_file}" > "${output_file}.sha256"
          echo "output_file=${output_file}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_RELEASE_TAG}"
          release_name="${INPUT_RELEASE_NAME}"

          if [[ -z "${release_tag}" ]]; then
            release_tag="kubekey-artifact-${KUBERNETES_VERSION}-arm64-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="KubeKey artifact ${KUBERNETES_VERSION} arm64 (${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT})"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            ${{ steps.export.outputs.output_file }}
            ${{ steps.export.outputs.output_file }}.sha256
            manifest-${{ env.ARCH }}.yaml

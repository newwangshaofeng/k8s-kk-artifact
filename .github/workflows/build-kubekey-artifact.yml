name: build-kubekey-artifact

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: Kubernetes version
        required: true
        default: v1.30.10
      release_tag:
        description: Optional GitHub Release tag
        required: false
        default: ""
      release_name:
        description: Optional GitHub Release name
        required: false
        default: ""

permissions:
  contents: read

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_RELEASE_TAG}"
          release_name="${INPUT_RELEASE_NAME}"

          if [[ -z "${release_tag}" ]]; then
            release_tag="kubekey-artifact-${KUBERNETES_VERSION}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="KubeKey artifact ${KUBERNETES_VERSION} (${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT})"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  export-artifact:
    name: export-${{ matrix.arch }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download KubeKey
        shell: bash
        run: |
          set -euo pipefail
          curl -sfL https://get-kk.kubesphere.io | sh -
          chmod +x kk

      - name: Generate manifest
        shell: bash
        run: |
          set -euo pipefail
          ./kk create manifest --with-kubernetes "${KUBERNETES_VERSION}" -y
          manifest_source=""
          for candidate in manifest.yaml manifest-sample.yaml sample.yaml config-sample.yaml; do
            if [[ -f "${candidate}" ]]; then
              manifest_source="${candidate}"
              break
            fi
          done
          if [[ -z "${manifest_source}" ]]; then
            manifest_source="$(find . -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) | sed 's|^\./||' | grep -v '^manifest-\(amd64\|arm64\)\.yaml$' | head -n 1)"
          fi
          if [[ -z "${manifest_source}" ]]; then
            echo "No manifest file generated by kk create manifest"
            ls -la
            exit 1
          fi
          python3 -m pip install --disable-pip-version-check pyyaml
          python3 scripts/prepare_kubekey_manifest.py \
            --input "${manifest_source}" \
            --output "manifest-${{ matrix.arch }}.yaml" \
            --arch "${{ matrix.arch }}"

      - name: Validate manifest compatibility
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.arch }}" == "arm64" ]] && grep -q "hybridnetdev/hybridnet" "manifest-arm64.yaml"; then
            echo "arm64 manifest still contains hybridnet image"
            cat "manifest-arm64.yaml"
            exit 1
          fi

      - name: Export artifact package
        id: export
        shell: bash
        run: |
          set -euo pipefail
          output_file="kubekey-artifact-k8s-${KUBERNETES_VERSION}-kk-latest-linux-${{ matrix.arch }}.tar.gz"
          sudo ./kk artifact export -m "manifest-${{ matrix.arch }}.yaml" -o "${output_file}"
          sudo chown "$(id -u):$(id -g)" "${output_file}"
          sha256sum "${output_file}" > "${output_file}.sha256"
          echo "output_file=${output_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact package
        id: upload_package
        uses: actions/upload-artifact@v4
        with:
          name: kubekey-artifact-${{ matrix.arch }}
          path: |
            ${{ steps.export.outputs.output_file }}
            ${{ steps.export.outputs.output_file }}.sha256
            manifest-${{ matrix.arch }}.yaml
          if-no-files-found: error
          retention-days: 3

      - name: Record artifact download metadata
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload_package.outputs.artifact-url }}
        run: |
          set -euo pipefail
          output_file="${{ steps.export.outputs.output_file }}"
          file_size="$(stat -c %s "${output_file}")"
          {
            echo "artifact_name=kubekey-artifact-${{ matrix.arch }}"
            echo "artifact_url=${ARTIFACT_URL}"
            echo "artifact_run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "package_file=${output_file}"
            echo "package_size=${file_size}"
            echo "retention_days=3"
          } > "artifact-metadata-${{ matrix.arch }}.txt"

      - name: Upload artifact metadata
        uses: actions/upload-artifact@v4
        with:
          name: kubekey-artifact-meta-${{ matrix.arch }}
          path: artifact-metadata-${{ matrix.arch }}.txt
          if-no-files-found: error
          retention-days: 3

  publish-release:
    name: publish-release
    needs:
      - prepare-release
      - export-artifact
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kubekey-artifact-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          shopt -s nullglob

          for file in release-assets/*.sha256 release-assets/manifest-*.yaml; do
            cp "${file}" release-upload/
          done

          for file in release-assets/*.tar.gz; do
            base_name="$(basename "${file}")"
            file_size="$(stat -c %s "${file}")"

            if (( file_size < 2147483648 )); then
              cp "${file}" release-upload/
              continue
            fi

            metadata_file="$(grep -rl "^package_file=${base_name}$" release-assets/artifact-metadata-*.txt | head -n 1)"
            if [[ -z "${metadata_file}" ]]; then
              echo "Missing artifact metadata for ${base_name}"
              exit 1
            fi

            artifact_url="$(sed -n 's/^artifact_url=//p' "${metadata_file}")"
            run_url="$(sed -n 's/^artifact_run_url=//p' "${metadata_file}")"
            artifact_name="$(sed -n 's/^artifact_name=//p' "${metadata_file}")"
            retention_days="$(sed -n 's/^retention_days=//p' "${metadata_file}")"
            {
              printf '%s\n' "This package is larger than GitHub Release's 2GB single-file limit."
              printf '%s\n' "Download it from the GitHub Actions artifact instead:"
              printf '%s\n' "${artifact_url}"
              printf '\n'
              printf '%s\n' "Actions run page:"
              printf '%s\n' "${run_url}"
              printf '\n'
              printf '%s\n' "Artifact name: ${artifact_name}"
              printf '%s\n' "Package file inside the downloaded zip: ${base_name}"
              printf '%s\n' "Artifact retention days: ${retention_days}"
            } > "release-upload/${base_name}.actions-artifact-url.txt"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-upload/*
